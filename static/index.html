<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fry Counter</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #1D9E75;
    --green-dark: #0F6E56;
    --blue: #185FA5;
    --blue-dark: #0C447C;
    --orange: #D85A30;
    --orange-dark: #993C1D;
    --bg: #0e1a14;
    --surface: #162018;
    --surface2: #1e2d21;
    --border: rgba(255,255,255,0.08);
    --text: #e8f5ee;
    --text-muted: #7aab8a;
    --radius: 12px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1rem;
  }

  h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.5px;
    margin: 0.75rem 0 1rem;
    color: var(--green);
  }

  #app { width: 100%; max-width: 480px; }

  /* Camera / preview area */
  #view {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    border-radius: var(--radius);
    overflow: hidden;
    background: #000;
    border: 1px solid var(--border);
  }

  #video, #preview-img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: none;
    position: absolute; top: 0; left: 0;
  }

  #placeholder {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px; color: var(--text-muted); font-size: 14px; text-align: center; padding: 2rem;
  }

  .cam-icon { font-size: 48px; opacity: 0.4; }

  #overlay-count {
    position: absolute; top: 12px; right: 12px;
    background: rgba(0,0,0,0.75);
    color: #fff; font-size: 36px; font-weight: 700;
    padding: 6px 18px; border-radius: 10px;
    display: none;
    text-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }

  #status-bar {
    position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.7); color: #fff;
    font-size: 13px; padding: 5px 14px;
    border-radius: 99px; white-space: nowrap;
    max-width: 90%; text-align: center;
  }

  /* Buttons */
  .btn-row { display: flex; gap: 8px; margin-top: 10px; }

  button {
    flex: 1; padding: 12px 6px;
    border-radius: 10px; font-size: 14px; font-weight: 600;
    cursor: pointer; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text);
    transition: opacity 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  button:active:not(:disabled) { transform: scale(0.97); }
  button:disabled { opacity: 0.3; cursor: not-allowed; }

  #start-btn { background: var(--green); color: #fff; border-color: var(--green-dark); }
  #count-btn { background: var(--blue); color: #fff; border-color: var(--blue-dark); }
  #live-btn.live-on { background: var(--orange); color: #fff; border-color: var(--orange-dark); }

  /* Upload */
  #upload-row { text-align: center; margin-top: 10px; }
  #upload-input { display: none; }
  #upload-label {
    cursor: pointer; font-size: 13px;
    color: var(--green); text-decoration: underline;
    -webkit-tap-highlight-color: transparent;
  }

  /* Results card */
  #results {
    margin-top: 14px;
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    border: 1px solid var(--border);
  }

  #results-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  #count-number { font-size: 64px; font-weight: 700; color: var(--text); line-height: 1; }
  #count-unit { font-size: 18px; color: var(--text-muted); margin-left: 4px; }
  #count-note { font-size: 13px; color: var(--text-muted); margin-top: 8px; min-height: 18px; }

  /* History */
  #history { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; display: none; }
  #history h4 { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .hist-row { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; color: var(--text-muted); border-bottom: 1px solid var(--border); }
  .hist-row:last-child { border-bottom: none; }
  .hist-count { font-weight: 600; color: var(--text); }

  /* Spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin {
    display: inline-block; width: 13px; height: 13px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 5px;
  }

  /* Footer */
  footer { margin-top: 20px; font-size: 11px; color: var(--text-muted); opacity: 0.5; text-align: center; }
</style>
</head>
<body>

<div id="app">
  <h1>🐟 Fry Counter</h1>

  <div id="view">
    <video id="video" playsinline autoplay muted></video>
    <img id="preview-img" alt="fry photo">
    <canvas id="canvas" style="display:none"></canvas>

    <div id="placeholder">
      <div class="cam-icon">📷</div>
      <div>Start camera or upload a photo<br>of your fry bucket</div>
    </div>

    <div id="overlay-count"></div>
    <div id="status-bar">ready</div>
  </div>

  <div class="btn-row">
    <button id="start-btn">camera</button>
    <button id="snap-btn" disabled>snap</button>
    <button id="count-btn" disabled>count fry</button>
    <button id="live-btn" disabled>live</button>
  </div>

  <div id="upload-row">
    <label id="upload-label" for="upload-input">upload a photo instead</label>
    <input type="file" id="upload-input" accept="image/*" capture="environment">
  </div>

  <div id="results">
    <div id="results-label">fry count</div>
    <div>
      <span id="count-number">—</span>
      <span id="count-unit" style="display:none">fry</span>
    </div>
    <div id="count-note"></div>
    <div id="history">
      <h4>recent counts</h4>
      <div id="hist-list"></div>
    </div>
  </div>
</div>

<footer>powered by Claude · point camera straight down for best results</footer>

<script>
(function () {
  var video = document.getElementById('video');
  var canvas = document.getElementById('canvas');
  var previewImg = document.getElementById('preview-img');
  var placeholder = document.getElementById('placeholder');
  var statusBar = document.getElementById('status-bar');
  var overlayCount = document.getElementById('overlay-count');
  var countNumber = document.getElementById('count-number');
  var countUnit = document.getElementById('count-unit');
  var countNote = document.getElementById('count-note');
  var snapBtn = document.getElementById('snap-btn');
  var countBtn = document.getElementById('count-btn');
  var liveBtn = document.getElementById('live-btn');
  var startBtn = document.getElementById('start-btn');
  var histDiv = document.getElementById('history');
  var histList = document.getElementById('hist-list');
  var uploadInput = document.getElementById('upload-input');

  var counting = false;
  var liveTimer = null;
  var histLog = [];
  var hasCamera = false;
  var currentB64 = null;

  startBtn.addEventListener('click', startCamera);
  snapBtn.addEventListener('click', snapPhoto);
  countBtn.addEventListener('click', function () { if (currentB64) doCount(currentB64); });
  liveBtn.addEventListener('click', toggleLive);
  uploadInput.addEventListener('change', function (e) {
    if (e.target.files[0]) handleUpload(e.target.files[0]);
  });

  function startCamera() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      setStatus('camera not supported — use upload');
      return;
    }
    setStatus('requesting camera...');
    navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 } } })
      .then(function (stream) {
        video.srcObject = stream;
        video.style.display = 'block';
        previewImg.style.display = 'none';
        placeholder.style.display = 'none';
        hasCamera = true;
        snapBtn.disabled = false;
        liveBtn.disabled = false;
        startBtn.textContent = 'flip';
        setStatus('point straight down at bucket');
      })
      .catch(function (err) {
        setStatus('camera denied — use upload');
      });
  }

  function snapPhoto() {
    canvas.width = video.videoWidth || 640;
    canvas.height = video.videoHeight || 480;
    canvas.getContext('2d').drawImage(video, 0, 0);
    currentB64 = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];
    previewImg.src = canvas.toDataURL('image/jpeg', 0.85);
    previewImg.style.display = 'block';
    countBtn.disabled = false;
    setStatus('photo snapped — tap count fry');
  }

  function handleUpload(file) {
    var reader = new FileReader();
    reader.onload = function (ev) {
      var img = new Image();
      img.onload = function () {
        // Scale down if very large to keep payload reasonable
        var maxDim = 1280;
        var w = img.naturalWidth, h = img.naturalHeight;
        if (w > maxDim || h > maxDim) {
          var scale = Math.min(maxDim / w, maxDim / h);
          w = Math.round(w * scale); h = Math.round(h * scale);
        }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        currentB64 = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];
        video.style.display = 'none';
        placeholder.style.display = 'none';
        previewImg.src = ev.target.result;
        previewImg.style.display = 'block';
        countBtn.disabled = false;
        overlayCount.style.display = 'block';
        setStatus('photo loaded — counting...');
        doCount(currentB64);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  function toggleLive() {
    if (liveTimer) {
      clearInterval(liveTimer); liveTimer = null;
      liveBtn.textContent = 'live';
      liveBtn.classList.remove('live-on');
      setStatus('live mode off');
    } else {
      liveBtn.textContent = 'stop';
      liveBtn.classList.add('live-on');
      setStatus('live — counting every 5s');
      snapAndCount();
      liveTimer = setInterval(function () { if (!counting) snapAndCount(); }, 5000);
    }
  }

  function snapAndCount() {
    canvas.width = video.videoWidth || 640;
    canvas.height = video.videoHeight || 480;
    canvas.getContext('2d').drawImage(video, 0, 0);
    var b64 = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];
    doCount(b64);
  }

  function doCount(b64) {
    if (counting) return;
    counting = true;
    countBtn.disabled = true;
    overlayCount.style.display = 'block';
    overlayCount.textContent = '...';
    countNumber.textContent = '...';
    countUnit.style.display = 'none';
    setStatus('<span class="spin"></span>counting fry...');

    fetch('/count', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: b64 })
    })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (data.error) throw new Error(data.error);
        var n = typeof data.count === 'number' ? data.count : '?';
        countNumber.textContent = n;
        countUnit.style.display = 'inline';
        overlayCount.textContent = n;
        countNote.textContent = (data.confidence || '') + (data.note ? ' — ' + data.note : '');
        setStatus('done');
        var t = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        histLog.unshift({ time: t, count: n });
        if (histLog.length > 6) histLog.pop();
        renderHistory();
        countBtn.disabled = false;
        counting = false;
      })
      .catch(function (err) {
        countNumber.textContent = '!';
        countNote.textContent = 'error: ' + (err.message || 'unknown');
        overlayCount.textContent = '!';
        setStatus('error — check server');
        countBtn.disabled = false;
        counting = false;
      });
  }

  function renderHistory() {
    if (!histLog.length) return;
    histDiv.style.display = 'block';
    histList.innerHTML = histLog.map(function (h) {
      return '<div class="hist-row"><span>' + h.time + '</span><span class="hist-count">' + h.count + ' fry</span></div>';
    }).join('');
  }

  function setStatus(html) { statusBar.innerHTML = html; }
})();
</script>

</body>
</html>
